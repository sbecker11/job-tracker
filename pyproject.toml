[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "job-tracker"
version = "0.1.0"
description = "Job-search automation pipeline for recruiting inbox processing"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "requests>=2.31.0",
    "beautifulsoup4>=4.12.0",
]

[project.scripts]
resolve-jd = "job_tracker.cli.resolve_jd:main"

[tool.setuptools.packages.find]
where = ["src"]
