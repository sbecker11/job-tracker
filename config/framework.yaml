# Verdict thresholds on match_pct (0-100), applied after the dealbreaker sweep.
# match_pct (2026-07-11 rescale) is JD-relative: matched-candidate-skill
# weight / (matched-candidate-skill weight + matched-generic-vocabulary
# weight) — i.e. of the recognizable tech stack *this JD* actually mentions,
# what fraction does the candidate cover. A JD whose entire stated stack is
# things the candidate knows scores near 100%; thresholds below are
# calibrated to that scale, not the old "vs. whole career vocabulary" one.
thresholds:
  pursue_min_pct: 50
  review_min_pct: 25
  # Gate for the no-LLM-review -> full-LLM-review pipeline stage (see
  # CLAUDE.md / apply_package.py): only spend an LLM call once the free
  # rule-based pass already looks like a strong stack match.
  llm_review_min_pct: 70
