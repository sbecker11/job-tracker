# JD Match Framework — transcribed from ~/CLAUDE.md (Sections 1-3, 8-9).
# Used by src/job_tracker/scoring/scorer.py to run the dealbreaker sweep and
# skills-alignment match % before a lead is surfaced as pursue/review/pass.
#
# This is a keyword-heuristic v1 (no LLM). It is intentionally conservative:
# ambiguous or low-signal results come back as "review" rather than being
# silently dropped, since a human still makes the final call (per CLAUDE.md's
# human-in-the-loop rule for recruiter/client-facing decisions).
#
# Keep this file in sync with ~/CLAUDE.md when that file changes.

candidate:
  name: "Shawn Becker"
  positioning: "Senior individual-contributor track"
  compensation_floor:
    contract_hourly_w2_usd: 75
    permanent_base_usd: 115000

# Structural / stack dealbreakers (CLAUDE.md §3). "keywords" are matched
# case-insensitively with word boundaries against the JD text.
# load_bearing_threshold: how many times a keyword must appear (or appear in
# the title) before it's treated as "load-bearing" rather than a passing
# mention in a long stack list.
dealbreakers:
  - id: c2c_only
    label: "C2C-only (no W2 option)"
    keywords: ["corp-to-corp only", "corp to corp only", "c2c only", "1099 only", "no w2"]
    min_hits: 1
    verdict: "Structural mismatch — cannot do C2C"
  - id: golang
    label: "Go/Golang as load-bearing requirement"
    keywords: ["golang", "\\bgo\\b"]
    min_hits: 2
    verdict: "Dealbreaker if load-bearing"
  - id: django
    label: "Django as load-bearing requirement"
    keywords: ["django"]
    min_hits: 1
    verdict: "Dealbreaker if load-bearing"
  - id: php
    label: "PHP as load-bearing requirement"
    keywords: ["\\bphp\\b"]
    min_hits: 1
    verdict: "Dealbreaker if load-bearing"
  - id: angular
    label: "Angular as load-bearing requirement"
    keywords: ["angular"]
    min_hits: 1
    verdict: "Dealbreaker if load-bearing"
  - id: dotnet
    label: ".NET / C# as load-bearing requirement"
    keywords: ["\\.net\\b", "c#", "asp\\.net"]
    min_hits: 1
    verdict: "Dealbreaker if load-bearing"
  - id: onsite_only
    label: "Onsite-only, not in/near Lehi, UT"
    # Added 2026-07-06 after a Des Moines, IA "(Onsite)" role slipped
    # through. Deliberately targets unambiguous mandatory-onsite phrasing
    # (including the "(Onsite)" title/subject tag job boards use, same
    # convention as "(Remote)"/"(Hybrid)") rather than the bare word
    # "onsite" alone, which also shows up in flexible/hybrid JDs ("mostly
    # remote with occasional onsite team days") this candidate would still
    # consider — see CLAUDE.md §3.
    keywords:
      - "\\(on-?site\\)"
      - "100% onsite"
      - "onsite only"
      - "on-?site only"
      - "must work onsite"
      - "must be onsite"
      - "based onsite"
      - "no remote option"
      - "not a remote (role|position)"
      - "relocation required"
      - "must relocate"
      - "in-office five days"
      - "5 days? (a week )?onsite"
      # Broadened 2026-07-07 after a Torrance, CA role ("Expected onsite
      # schedule is four days per week") slipped through — the old patterns
      # only caught digit "5 days" phrasing, missing spelled-out numbers and
      # the common 3-4 days/week near-mandatory-onsite shape. Deliberately
      # starts at 3 (not 1-2), matching this dealbreaker's "onsite-only"
      # framing rather than the flexible/occasional-onsite hybrid setups
      # CLAUDE.md says are still worth considering.
      - "(\\b3\\b|\\b4\\b|\\b5\\b|three|four|five)\\+?\\s*days?\\s*(a|per|/)\\s*week[^.]{0,60}(on-?site|in-office|in office)"
      - "(on-?site|in-office|in office)[^.]{0,60}(\\b3\\b|\\b4\\b|\\b5\\b|three|four|five)\\+?\\s*days?\\s*(a|per|/)\\s*week"
    min_hits: 1
    verdict: "Dealbreaker — onsite-only, not in/near Lehi, UT"

# Explicitly NOT a dealbreaker (CLAUDE.md §3) — never flagged.
# Documentation for humans + LLM-facing sync; the keyword scorer only
# fires on `dealbreakers:` above. Citizenship / no-sponsorship is also
# enforced as ✅ fit in llm_apply.py's `_EVAL_SYSTEM_PROMPT` and ~/CLAUDE.md.
not_dealbreakers:
  - id: w2_only
    label: "W2-only"
    note: "This is a fit, not a concern"
  - id: us_citizen_or_no_sponsorship
    label: "US citizen required / authorized to work without sponsorship"
    note: >-
      Clear fit (candidate is a US citizen; no sponsorship needed).
      Evaluation/targeting only — never write citizenship or sponsorship
      status into résumé/cover letter (CLAUDE.md §4 rule 11). Added
      2026-07-16 after Magnet Forensics was incorrectly gated to REVIEW.

