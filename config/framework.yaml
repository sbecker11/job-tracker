# Broad, generic software-engineering tech vocabulary — languages,
# frameworks, databases, cloud platforms, infra/data tooling — deliberately
# NOT limited to the candidate's own skills above. Used only as the
# denominator for match_pct (2026-07-11 rescale, see scoring/scorer.py's
# _skills_alignment): "of the recognizable tech stack this specific JD
# actually asks for, what fraction does the candidate cover?" instead of
# "what fraction of the candidate's entire multi-decade vocabulary happens
# to overlap with this one JD" (the old formula, which topped out around
# ~23% for any real JD in the historical corpus since no single posting
# mentions most of a candidate's whole career stack). Keep entries here
# distinct from the `skills:` keywords above (no exact duplicates) so a
# term is never double-counted. Weight defaults to 1 (all generic/unweighted)
# unless given explicitly; entries with no explicit `weight:` are read by
